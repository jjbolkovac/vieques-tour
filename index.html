<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vieques Island Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --sand: #F5EDD8;
    --deep: #1A2B2F;
    --ocean: #1E6B8A;
    --teal: #2AADA6;
    --coral: #E07B54;
    --bio: #4DD9AC;
    --text: #1A2B2F;
    --muted: #6B7B7E;
    --white: #FFFFFF;
    --card-bg: rgba(255,255,255,0.92);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--deep);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    color: var(--bio);
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--sand); font-weight: 400; font-size: 0.85rem; display: block; line-height: 1; }
  nav { display: flex; gap: 0.25rem; }
  nav button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  nav button:hover, nav button.active {
    background: rgba(255,255,255,0.1);
    color: var(--white);
  }
  nav button.active { color: var(--bio); }

  /* MAIN LAYOUT */
  .app { display: flex; height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    width: 380px;
    min-width: 320px;
    background: var(--white);
    overflow-y: auto;
    border-right: 1px solid rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
  }

  /* VIEWS */
  .view { display: none; flex-direction: column; flex: 1; }
  .view.active { display: flex; }

  /* STOPS VIEW */
  .stops-header {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid rgba(0,0,0,0.07);
  }
  .stops-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--deep);
    margin-bottom: 0.4rem;
  }
  .stops-header p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

  .filter-row {
    display: flex;
    gap: 0.4rem;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    border: 1.5px solid rgba(0,0,0,0.12);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    background: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--teal); color: var(--teal); }
  .filter-btn.on { background: var(--teal); border-color: var(--teal); color: white; }

  .stop-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
  .stop-card {
    display: flex;
    gap: 0.75rem;
    padding: 0.9rem 1.5rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    transition: background 0.15s;
    align-items: flex-start;
  }
  .stop-card:hover { background: rgba(0,0,0,0.025); }
  .stop-card.selected { background: rgba(42,173,166,0.08); border-left: 3px solid var(--teal); padding-left: calc(1.5rem - 3px); }
  .stop-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .stop-info { flex: 1; min-width: 0; }
  .stop-name { font-weight: 500; font-size: 0.9rem; color: var(--deep); margin-bottom: 0.15rem; }
  .stop-tagline { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .stop-badges { display: flex; gap: 0.3rem; margin-top: 0.35rem; flex-wrap: wrap; }
  .badge {
    font-size: 0.68rem; font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* DETAIL PANEL */
  .detail-panel {
    position: fixed;
    top: 60px; right: 0; bottom: 0;
    width: 360px;
    background: var(--white);
    box-shadow: -4px 0 20px rgba(0,0,0,0.2);
    overflow-y: auto;
    z-index: 2000;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-close {
    position: absolute; top: 1rem; right: 1rem;
    background: rgba(0,0,0,0.55);
    border: none; width: 38px; height: 38px;
    border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    color: white; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    z-index: 10;
  }
  .detail-close:hover { background: rgba(0,0,0,0.8); }
  .detail-hero {
    height: 180px;
    display: flex; align-items: flex-end;
    padding: 1rem;
    position: relative;
  }
  .detail-hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    line-height: 1.2;
  }
  .detail-hero-sub { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin-top: 0.2rem; }
  .detail-body { padding: 1.25rem 1.5rem; }
  .detail-section { margin-bottom: 1.25rem; }
  .detail-section h3 {
    font-size: 0.72rem; font-weight: 700;
    color: var(--teal); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .detail-section p { font-size: 0.88rem; line-height: 1.65; color: var(--text); }
  .detail-tips li { font-size: 0.85rem; line-height: 1.6; color: var(--text); margin-left: 1.1rem; margin-bottom: 0.2rem; }
  .detail-meta-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.6rem; margin-bottom: 1rem;
  }
  .meta-item {
    background: var(--sand);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
  }
  .meta-label { font-size: 0.68rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-value { font-size: 0.88rem; font-weight: 500; color: var(--deep); margin-top: 0.1rem; }

  /* MAP */
  #map { flex: 1; z-index: 1; }

  /* ITINERARY VIEW */
  .itinerary-view { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; }
  .itinerary-view h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 600;
    color: var(--deep); margin-bottom: 0.3rem;
  }
  .itinerary-view > p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.5; }
  .day-block { margin-bottom: 1.5rem; }
  .day-label {
    font-size: 0.72rem; font-weight: 700;
    color: var(--ocean); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .day-label::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }
  .it-stop {
    display: flex; gap: 0.75rem;
    margin-bottom: 0; position: relative;
  }
  .it-left { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; }
  .it-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .it-line { flex: 1; width: 2px; background: rgba(0,0,0,0.07); margin-top: 2px; min-height: 30px; }
  .it-content {
    flex: 1; padding-bottom: 1rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .it-content:hover { opacity: 0.8; }
  .it-time { font-size: 0.72rem; color: var(--muted); font-weight: 500; margin-bottom: 0.1rem; }
  .it-name { font-weight: 500; font-size: 0.9rem; color: var(--deep); }
  .it-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; line-height: 1.4; }
  .it-duration {
    display: inline-block; font-size: 0.68rem; font-weight: 600;
    background: rgba(0,0,0,0.05); padding: 0.1rem 0.4rem;
    border-radius: 4px; color: var(--muted); margin-top: 0.3rem;
  }

  /* HISTORY VIEW */
  .history-view { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; }
  .history-view h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 600;
    color: var(--deep); margin-bottom: 1rem;
  }
  .history-card {
    background: var(--sand);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.75rem;
    border-left: 3px solid var(--ocean);
  }
  .history-year { font-size: 0.72rem; font-weight: 700; color: var(--ocean); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
  .history-title { font-weight: 600; font-size: 0.92rem; margin-bottom: 0.3rem; color: var(--deep); }
  .history-text { font-size: 0.82rem; line-height: 1.6; color: #3a4a4e; }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    background: var(--deep); color: white;
    border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  }
  .leaflet-popup-tip { background: var(--deep); }
  .leaflet-popup-content { margin: 10px 14px; font-family: 'DM Sans', sans-serif; }
  .popup-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.2rem; }
  .popup-cat { font-size: 0.75rem; color: rgba(255,255,255,0.65); }

  /* Category colors */
  .cat-beach  { background: #D4EDFE; color: #1E6B8A; }
  .cat-nature { background: #D4F5E4; color: #1A7A4A; }
  .cat-bio    { background: #D0FAF0; color: #0B7A60; }
  .cat-history{ background: #FCE8D8; color: #A04A20; }
  .cat-food   { background: #FFF0D0; color: #8A5A10; }

  .num-beach  { background: #1E6B8A; color: white; }
  .num-nature { background: #1A7A4A; color: white; }
  .num-bio    { background: #0B7A60; color: white; }
  .num-history{ background: #A04A20; color: white; }
  .num-food   { background: #8A5A10; color: white; }

  .dot-beach  { background: #1E6B8A; }
  .dot-nature { background: #1A7A4A; }
  .dot-bio    { background: #0B7A60; }
  .dot-history{ background: #A04A20; }
  .dot-food   { background: #8A5A10; }

  /* Responsive */
  @media (max-width: 680px) {
    .sidebar { width: 100%; min-width: unset; }
    .app { flex-direction: column; height: auto; }
    #map { min-height: 300px; }
    .detail-panel { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    Vieques
    <span>Island Tour Guide</span>
  </div>
  <nav>
    <button class="active" onclick="showView('stops')">Stops</button>
    <button onclick="showView('itinerary')">Itinerary</button>
    <button onclick="showView('history')">History</button>
  </nav>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- STOPS VIEW -->
    <div class="view active" id="view-stops">
      <div class="stops-header">
        <h2>Tour Stops</h2>
        <p>18 curated stops across beaches, history, nature & the bioluminescent bay.</p>
      </div>
      <div class="filter-row">
        <button class="filter-btn on" onclick="toggleFilter(this,'all')">All</button>
        <button class="filter-btn" onclick="toggleFilter(this,'beach')">Beaches</button>
        <button class="filter-btn" onclick="toggleFilter(this,'nature')">Nature</button>
        <button class="filter-btn" onclick="toggleFilter(this,'bio')">Bio Bay</button>
        <button class="filter-btn" onclick="toggleFilter(this,'history')">History</button>
      </div>
      <div class="stop-list" id="stop-list"></div>
    </div>

    <!-- ITINERARY VIEW -->
    <div class="view" id="view-itinerary">
      <div class="itinerary-view">
        <h2>Suggested Itinerary</h2>
        <p>A 2-day tour covering Vieques' top highlights — from sunrise beaches to the glowing bay at night.</p>
        <div id="itinerary-list"></div>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view" id="view-history">
      <div class="history-view">
        <h2>Island History</h2>
        <div id="history-list"></div>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- MAP -->
  <div id="map"></div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="document.getElementById('detail-panel').classList.remove('open'); selectedStop=null;">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// =============================================
// DATA
// =============================================
const stops = [
  {
    id: 1, name: "Sun Bay (Sombé)", cat: "beach",
    lat: 18.1057, lng: -65.4380,
    tagline: "The island's most beloved public beach",
    desc: "Sun Bay is the crown jewel of Vieques' public beaches — a sweeping mile-long crescent of golden sand backed by sea grape trees. The calm, shallow turquoise waters make it ideal for swimming and snorkeling. A small camping area makes it a favorite for overnight visitors.",
    tips: ["Arrive early on weekends to claim a good spot", "Shade under sea grape trees along the eastern end", "Vendors sell drinks on busier days", "Walk east toward Media Luna for quieter sands"],
    hours: "7am – 6pm", duration: "2–3 hrs", best: "Morning"
  },
  {
    id: 2, name: "Media Luna Beach", cat: "beach",
    lat: 18.1048, lng: -65.4313,
    tagline: "Secluded crescent with reef snorkeling",
    desc: "Just a short walk east from Sun Bay, Media Luna offers a quieter escape with excellent snorkeling off the rocky edges of its small crescent bay. The reef close to shore shelters colorful fish and the occasional sea turtle. No facilities — pack in what you need.",
    tips: ["Bring snorkel gear — the reef is right off the beach", "Often nearly empty on weekdays", "Only accessible on foot from Sun Bay"],
    hours: "Dawn – Dusk", duration: "1–2 hrs", best: "Morning"
  },
  {
    id: 3, name: "Navio Beach", cat: "beach",

    tagline: "Wild & remote Atlantic-facing beach",
    desc: "One of the most remote beaches on Vieques' south coast, Navio requires a short hike through brush to reach. The reward is a wild, undeveloped stretch with dramatic waves, driftwood, and virtually no crowds. Swimming can be rough — best for experienced swimmers.",
    tips: ["4WD recommended for the road", "Bring everything you need — zero facilities", "Excellent for shell collecting", "Not recommended for children due to surf"],
    hours: "Dawn – Dusk", duration: "1–2 hrs", best: "Afternoon"
  },
  {
    id: 4, name: "Mosquito Pier", cat: "nature",
    lat: 18.1400, lng: -65.4700,
    tagline: "Snorkeling & historic military pier",

    tips: ["Morning snorkeling is best for visibility", "Watch for rays in the shallow flats", "Photographing the pier at sunset is spectacular", "Shallow enough to wade from shore"],
    hours: "Dawn – Dusk", duration: "1–2 hrs", best: "Morning or Sunset"
  },
  {
    id: 5, name: "Bioluminescent Bay (Mosquito Bay)", cat: "bio",
    lat: 18.1258, lng: -65.4648,
    tagline: "The brightest bio bay in the world",
    desc: "Mosquito Bay holds the Guinness World Record as the brightest bioluminescent bay on Earth. Millions of single-celled dinoflagellates (Pyrodinium bahamense) light up the water with an ethereal blue-green glow when disturbed. Tours by kayak or electric pontoon boat are the only legal access.",
    tips: ["No-moon nights (new moon ±3 days) are the brightest", "Kayak tours feel more magical than pontoon", "Book tours in advance — they fill up quickly", "Don't apply sunscreen before going in", "Swimming is allowed by kayak tour only"],
    hours: "Tours from 7pm", duration: "2 hrs", best: "New moon nights"
  },
  {
    id: 6, name: "El Fortín Conde de Mirasol", cat: "history",
    lat: 18.1516, lng: -65.4434,
    tagline: "Last Spanish fort built in the Americas",
    desc: "Perched on a hill above Isabel Segunda, El Fortín was constructed between 1845 and 1865 and is considered the last military fortification built by Spain in the New World. Today it houses the Vieques Art & History Museum with exhibits on Taíno culture, Spanish colonization, and the decades-long struggle against the US Navy.",
    tips: ["Open Tue–Sun, small admission fee", "Best panoramic views of the north coast from the ramparts", "The museum's Navy-era exhibit is particularly moving", "Combine with a walk through Isabel Segunda"],
    hours: "Tue–Sun 10am–4pm", duration: "1–1.5 hrs", best: "Midday"
  },
  {
    id: 7, name: "Isabel Segunda", cat: "history",

    tagline: "Vieques' vibrant main town",
    desc: "The island's largest town is a colorful grid of pastel buildings, local restaurants, and the ferry terminal. The main plaza (parque) is a hub of island life — surrounded by the church, old government buildings, and the fort. Explore the waterfront, grab a cold beer at a colmado, or browse local art.",
    tips: ["The Sunday plaza market is worth catching", "Locals point you to the best frituras (fried snacks)", "Most car rentals and golf cart rentals are here", "Ask about the mural project around town"],

  {
    id: 8, name: "Esperanza Malecón", cat: "history",
    lat: 18.0946, lng: -65.4714,
    tagline: "Charming waterfront village strip",
    desc: "Esperanza is Vieques' southern village — a relaxed strip of guesthouses, restaurants, and bars along a concrete waterfront promenade overlooking a calm bay. Vendors sell fresh fish at dusk, fishing boats bob in the harbor, and the whole town seems to slow to a Caribbean rhythm.",
    tips: ["Coamó reef is visible from the waterfront", "Sunset from the malecón is stunning", "Most bio bay tour operators are based here", "Several excellent restaurants for fresh seafood"],
    hours: "Always open", duration: "1–2 hrs", best: "Sunset & Evening"
  },
  {
    id: 9, name: "Vieques National Wildlife Refuge", cat: "nature",
    lat: 18.1100, lng: -65.3900,
    tagline: "3,100 acres of wild eastern lands",
    desc: "The US Fish & Wildlife Service manages the eastern two-thirds of Vieques as a protected refuge — former Navy bombing range. Now open to visitors, it contains pristine beaches, dry forest, mangroves, and extraordinary biodiversity. Over 200 bird species have been recorded here.",
    tips: ["A 4WD vehicle is required for most trails", "Green Beach on the western refuge is excellent", "Bird watching is excellent October–March", "Pick up a refuge map at the entrance station"],
    hours: "Gates open sunrise to sunset", duration: "Half day", best: "Early morning"
  },
  {
    id: 10, name: "Red Beach (Caracas)", cat: "beach",
    lat: 18.1100, lng: -65.4200,
    tagline: "Iconic calm bay with vivid blue water",
    desc: "One of the most photographed beaches on Vieques, Red Beach sits inside a sheltered cove in the Wildlife Refuge. The water is impossibly clear in shades of aqua and blue, ideal for snorkeling and paddleboarding. The reddish tinge of the surrounding hills gives the beach its name.",
    tips: ["Some of the best snorkeling on the island", "Road requires 4WD", "Often less crowded than Sun Bay", "No facilities — bring water and food"],

  {

    tips: ["Explore multiple coves along the beach", "Bring snorkel gear and plenty of water", "Rocky path between coves requires careful footing", "Gets windy in the afternoon — ideal for morning visits"],

  },
  {
    id: 14, name: "Punta Arenas Lighthouse", cat: "history",
    lat: 18.1350, lng: -65.5240,
    tagline: "Historic 1896 lighthouse at land's end",
    desc: "The Punta Mulas lighthouse, built in 1896, guards the western tip of Vieques from a coral bluff. Now decommissioned, the elegant Spanish colonial structure sits surrounded by cacti and windswept scrub. The views across the channel toward Ceiba are among the best on the island.",
    tips: ["Located at the ferry terminal in Isabel II — easy to visit", "Grounds open but structure may be closed", "Gorgeous golden hour photography spot", "Combine with a stop at the market in town"],
    hours: "Grounds always open", duration: "30 min", best: "Sunset"

const itinerary = [
  { day: 1, time: "7:00 AM",  stopId: 14, note: "Watch sunrise from the lighthouse before town wakes up" },
  { day: 1, time: "8:30 AM",  stopId: 7,  note: "Breakfast in Isabel II, pick up your rental car" },
  { day: 1, time: "10:00 AM", stopId: 6,  note: "Explore the fort and museum — best history on the island" },
  { day: 1, time: "12:00 PM", stopId: 13, note: "Quick stop at the black sand beach before heading east" },
  { day: 1, time: "1:00 PM",  stopId: 11, note: "Swim and snorkel in the seven coves — bring lunch" },
  { day: 1, time: "4:00 PM",  stopId: 10, note: "Afternoon snorkel at Red Beach — best visibility" },
  { day: 1, time: "6:30 PM",  stopId: 8,  note: "Sunset drinks and dinner on the Esperanza malecón" },
  { day: 1, time: "8:00 PM",  stopId: 5,  note: "Bio bay kayak tour — book in advance! New moon best" },

  { day: 2, time: "9:00 AM",  stopId: 1,  note: "Morning swim at Sun Bay before the crowds arrive" },

const historyItems = [
  { year: "Pre-1493", title: "Taíno Settlement", text: "The Taíno people inhabited Vieques for centuries, calling the island 'Bieque' meaning small island or crab. They lived by fishing, farming, and ceramics. Petroglyphs and artifacts across the island still witness their presence." },
  { year: "1493", title: "European Contact", text: "Columbus passed near Vieques on his second voyage. Spanish colonization brought devastating consequences for the Taíno population through disease, forced labor, and violence. By the mid-1500s the indigenous population was largely gone." },
  { year: "1600s–1700s", title: "Colonial Struggles", text: "Spain, England, France, and Denmark all contested Vieques during this era. The island changed hands repeatedly and was used as a base for corsairs and smugglers. Formal colonization by Spain began in earnest in the 1820s." },

  { year: "Present", title: "Resilience & Culture", text: "Today Vieques is known for its extraordinary natural beauty, bioluminescent bay, wild beaches, and a strong, proud community culture. Despite Hurricane Maria's devastation in 2017 — and a slower recovery than mainland Puerto Rico — the island has rebuilt and remains one of the Caribbean's most special destinations." }
];

// =============================================
// STATE
// =============================================
let activeFilter = 'all';
let selectedStop = null;
let map, markers = {};

// =============================================
// INIT MAP
// =============================================
function initMap() {
  map = L.map('map', { center: [18.125, -65.44], zoom: 12 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  stops.forEach(s => {
    const color = catColor(s.cat);
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:30px;height:30px;border-radius:50%;background:${color};color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:DM Sans,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid white;">${s.id}</div>`,
      iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -18]
    });
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
    m.bindPopup(`<div class="popup-name">${s.name}</div><div class="popup-cat">${catLabel(s.cat)}</div>`);
    m.on('click', () => openDetail(s));
    markers[s.id] = m;
  });
}

function catColor(cat) {
  return { beach:'#1E6B8A', nature:'#1A7A4A', bio:'#0B7A60', history:'#A04A20', food:'#8A5A10' }[cat] || '#666';
}
function catLabel(cat) {
  return { beach:'Beach', nature:'Nature', bio:'Bio Bay', history:'History & Culture', food:'Food & Local' }[cat] || cat;
}

// =============================================
// RENDER STOPS
// =============================================
function renderStops() {
  const list = document.getElementById('stop-list');
  const filtered = activeFilter === 'all' ? stops : stops.filter(s => s.cat === activeFilter);
  list.innerHTML = filtered.map(s => `
    <div class="stop-card ${selectedStop?.id === s.id ? 'selected' : ''}" onclick="openDetail(stops.find(x=>x.id===${s.id}))">
      <div class="stop-num num-${s.cat}">${s.id}</div>
      <div class="stop-info">
        <div class="stop-name">${s.name}</div>
        <div class="stop-tagline">${s.tagline}</div>
        <div class="stop-badges">
          <span class="badge cat-${s.cat}">${catLabel(s.cat)}</span>
          <span class="badge" style="background:rgba(0,0,0,0.05);color:#666;">${s.best}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// =============================================
// RENDER ITINERARY
// =============================================
function renderItinerary() {
  const days = [1, 2];
  const el = document.getElementById('itinerary-list');
  el.innerHTML = days.map(day => {
    const items = itinerary.filter(i => i.day === day);
    return `
      <div class="day-block">
        <div class="day-label">Day ${day}</div>
        ${items.map((item, idx) => {
          const stop = stops.find(s => s.id === item.stopId);
          return `
            <div class="it-stop">
              <div class="it-left">
                <div class="it-dot dot-${stop.cat}"></div>
                ${idx < items.length-1 ? '<div class="it-line"></div>' : ''}
              </div>
              <div class="it-content" onclick="openDetail(stops.find(s=>s.id===${stop.id}));showView('stops')">
                <div class="it-time">${item.time}</div>
                <div class="it-name">${stop.name}</div>
                <div class="it-desc">${item.note}</div>
                <span class="it-duration">${stop.duration}</span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }).join('');
}

// =============================================
// RENDER HISTORY
// =============================================
function renderHistory() {
  document.getElementById('history-list').innerHTML = historyItems.map(h => `
    <div class="history-card">
      <div class="history-year">${h.year}</div>
      <div class="history-title">${h.title}</div>
      <div class="history-text">${h.text}</div>
    </div>
  `).join('');
}

// =============================================
// DETAIL PANEL
// =============================================
function openDetail(stop) {
  selectedStop = stop;
  renderStops();
  if (map) map.panTo([stop.lat, stop.lng], { animate: true, duration: 0.5 });
  const color = catColor(stop.cat);
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero" style="background: linear-gradient(160deg, ${color}cc, ${color}ee);">
      <div>
        <div class="detail-hero-title">${stop.name}</div>
        <div class="detail-hero-sub">${catLabel(stop.cat)}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-meta-grid">
        <div class="meta-item"><div class="meta-label">Duration</div><div class="meta-value">${stop.duration}</div></div>
        <div class="meta-item"><div class="meta-label">Best Time</div><div class="meta-value">${stop.best}</div></div>
        <div class="meta-item" style="grid-column:span 2"><div class="meta-label">Hours</div><div class="meta-value">${stop.hours}</div></div>
      </div>
      <div class="detail-section">
        <h3>About</h3>
        <p>${stop.desc}</p>
      </div>
      <div class="detail-section">
        <h3>Tips</h3>
        <ul class="detail-tips">${stop.tips.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>
    </div>
  `;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  selectedStop = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderStops();
}

// =============================================
// FILTERS & VIEWS
// =============================================
function toggleFilter(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderStops();
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['stops','itinerary','history'][i] === name);
  });
}

// =============================================
// BOOT
// =============================================
renderStops();
renderItinerary();
renderHistory();
setTimeout(initMap, 50);
</script>
</body>
</html>
