<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vieques Island Tour</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --sand: #F5EDD8; --deep: #1A2B2F; --ocean: #1E6B8A;
    --teal: #2AADA6; --bio: #4DD9AC; --text: #1A2B2F;
    --muted: #6B7B7E; --white: #FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--sand); color:var(--text); min-height:100vh; }

  header {
    background:var(--deep); padding:0 1.5rem;
    display:flex; align-items:center; justify-content:space-between;
    height:60px; position:sticky; top:0; z-index:1000;
  }
  .logo { font-family:'Playfair Display',serif; color:var(--bio); font-size:1.3rem; font-weight:700; }
  .logo span { color:var(--sand); font-weight:400; font-size:0.85rem; display:block; line-height:1; }
  nav { display:flex; gap:0.25rem; }
  nav button {
    background:none; border:none; color:rgba(255,255,255,0.6);
    font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500;
    padding:0.4rem 0.75rem; border-radius:6px; cursor:pointer; transition:all 0.2s;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  nav button:hover, nav button.active { background:rgba(255,255,255,0.1); color:#fff; }
  nav button.active { color:var(--bio); }

  .app { display:flex; height:calc(100vh - 60px); }
  .sidebar { width:380px; min-width:320px; background:#fff; overflow-y:auto; border-right:1px solid rgba(0,0,0,0.08); display:flex; flex-direction:column; }
  .view { display:none; flex-direction:column; flex:1; }
  .view.active { display:flex; }

  .stops-header { padding:1.25rem 1.5rem 1rem; border-bottom:1px solid rgba(0,0,0,0.07); }
  .stops-header h2 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:600; color:var(--deep); margin-bottom:0.4rem; }
  .stops-header p { font-size:0.82rem; color:var(--muted); line-height:1.5; }

  .filter-row { display:flex; gap:0.4rem; padding:0.75rem 1.5rem; border-bottom:1px solid rgba(0,0,0,0.06); flex-wrap:wrap; }
  .filter-btn {
    padding:0.3rem 0.75rem; border-radius:20px; border:1.5px solid rgba(0,0,0,0.12);
    font-size:0.75rem; font-weight:500; cursor:pointer; background:none;
    font-family:'DM Sans',sans-serif; color:var(--muted); transition:all 0.2s;
  }
  .filter-btn:hover { border-color:var(--teal); color:var(--teal); }
  .filter-btn.on { background:var(--teal); border-color:var(--teal); color:white; }

  .stop-list { flex:1; overflow-y:auto; padding:0.5rem 0; }
  .stop-card {
    display:flex; gap:0.75rem; padding:0.9rem 1.5rem;
    cursor:pointer; border-bottom:1px solid rgba(0,0,0,0.04);
    transition:background 0.15s; align-items:flex-start;
  }
  .stop-card:hover { background:rgba(0,0,0,0.025); }
  .stop-card.selected { background:rgba(42,173,166,0.08); border-left:3px solid var(--teal); padding-left:calc(1.5rem - 3px); }
  .stop-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; flex-shrink:0; margin-top:2px; }
  .stop-info { flex:1; min-width:0; }
  .stop-name { font-weight:500; font-size:0.9rem; color:var(--deep); margin-bottom:0.15rem; }
  .stop-tagline { font-size:0.78rem; color:var(--muted); line-height:1.4; }
  .stop-badges { display:flex; gap:0.3rem; margin-top:0.35rem; flex-wrap:wrap; }
  .badge { font-size:0.68rem; font-weight:600; padding:0.15rem 0.5rem; border-radius:10px; letter-spacing:0.03em; text-transform:uppercase; }

  /* DETAIL PANEL */
  .detail-panel {
    position:fixed; top:60px; right:0; bottom:0; width:400px;
    background:#fff; box-shadow:-4px 0 24px rgba(0,0,0,0.18);
    overflow-y:auto; z-index:2000;
    transform:translateX(100%);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .detail-panel.open { transform:translateX(0); }

  /* CLOSE BUTTON */
  #close-btn {
    position:absolute; top:12px; right:12px; z-index:10;
    background:rgba(0,0,0,0.6); border:none; color:white;
    width:38px; height:38px; border-radius:50%; cursor:pointer;
    font-size:1.1rem; font-weight:700; display:flex;
    align-items:center; justify-content:center; transition:background 0.15s;
  }
  #close-btn:hover { background:rgba(0,0,0,0.85); }



  .detail-name-bar { padding:0.9rem 1.25rem 0.75rem; border-bottom:1px solid rgba(0,0,0,0.06); }
  .detail-name-bar h2 { font-family:'Playfair Display',serif; font-size:1.25rem; font-weight:700; color:var(--deep); line-height:1.2; }
  .detail-name-bar p { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; }

  .detail-body { padding:1rem 1.25rem 2rem; }
  .detail-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.6rem; margin-bottom:1rem; }
  .meta-item { background:var(--sand); border-radius:8px; padding:0.6rem 0.75rem; }
  .meta-label { font-size:0.68rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
  .meta-value { font-size:0.88rem; font-weight:500; color:var(--deep); margin-top:0.1rem; }
  .detail-section { margin-bottom:1.2rem; }
  .detail-section h3 { font-size:0.72rem; font-weight:700; color:var(--teal); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.5rem; }
  .detail-section p { font-size:0.88rem; line-height:1.65; color:var(--text); }
  .detail-section ul { list-style:disc; padding-left:1.1rem; }
  .detail-section li { font-size:0.85rem; line-height:1.6; margin-bottom:0.2rem; }

  #map { flex:1; z-index:1; }

  /* ITINERARY */
  .scroll-view { padding:1.25rem 1.5rem; overflow-y:auto; flex:1; }
  .scroll-view h2 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:600; color:var(--deep); margin-bottom:0.3rem; }
  .scroll-view > p { font-size:0.82rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }
  .day-block { margin-bottom:1.5rem; }
  .day-label { font-size:0.72rem; font-weight:700; color:var(--ocean); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
  .day-label::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.08); }
  .it-stop { display:flex; gap:0.75rem; }
  .it-left { display:flex; flex-direction:column; align-items:center; width:28px; flex-shrink:0; }
  .it-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; margin-top:6px; }
  .it-line { flex:1; width:2px; background:rgba(0,0,0,0.07); margin-top:2px; min-height:30px; }
  .it-content { flex:1; padding-bottom:1rem; cursor:pointer; transition:opacity 0.15s; }
  .it-content:hover { opacity:0.75; }
  .it-time { font-size:0.72rem; color:var(--muted); font-weight:500; }
  .it-name { font-weight:500; font-size:0.9rem; color:var(--deep); }
  .it-desc { font-size:0.78rem; color:var(--muted); margin-top:0.15rem; line-height:1.4; }
  .it-dur { display:inline-block; font-size:0.68rem; font-weight:600; background:rgba(0,0,0,0.05); padding:0.1rem 0.4rem; border-radius:4px; color:var(--muted); margin-top:0.3rem; }

  /* HISTORY */
  .history-card { background:var(--sand); border-radius:10px; padding:1rem 1.1rem; margin-bottom:0.75rem; border-left:3px solid var(--ocean); }
  .history-year { font-size:0.72rem; font-weight:700; color:var(--ocean); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.25rem; }
  .history-title { font-weight:600; font-size:0.92rem; margin-bottom:0.3rem; color:var(--deep); }
  .history-text { font-size:0.82rem; line-height:1.6; color:#3a4a4e; }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper { background:var(--deep); color:white; border-radius:10px; }
  .leaflet-popup-tip { background:var(--deep); }
  .leaflet-popup-content { margin:10px 14px; font-family:'DM Sans',sans-serif; }
  .popup-name { font-weight:600; font-size:0.9rem; margin-bottom:0.2rem; }
  .popup-cat { font-size:0.75rem; color:rgba(255,255,255,0.6); }

  .cat-beach   { background:#D4EDFE; color:#1E6B8A; }
  .cat-nature  { background:#D4F5E4; color:#1A7A4A; }
  .cat-bio     { background:#D0FAF0; color:#0B7A60; }
  .cat-history { background:#FCE8D8; color:#A04A20; }
  .num-beach   { background:#1E6B8A; color:white; }
  .num-nature  { background:#1A7A4A; color:white; }
  .num-bio     { background:#0B7A60; color:white; }
  .num-history { background:#A04A20; color:white; }
  .dot-beach   { background:#1E6B8A; }
  .dot-nature  { background:#1A7A4A; }
  .dot-bio     { background:#0B7A60; }
  .dot-history { background:#A04A20; }

</style>
</head>
<body>

<header>
  <div class="logo">Vieques<span>Island Tour Guide</span></div>
  <nav>
    <button class="active" onclick="showView('stops')">Stops</button>
    <button onclick="showView('itinerary')">Itinerary</button>
    <button onclick="showView('history')">History</button>
  </nav>
</header>

<div class="app">

        <button class="filter-btn" onclick="toggleFilter(this,'beach')">Beaches</button>
        <button class="filter-btn" onclick="toggleFilter(this,'nature')">Nature</button>
        <button class="filter-btn" onclick="toggleFilter(this,'bio')">Bio Bay</button>
        <button class="filter-btn" onclick="toggleFilter(this,'history')">History</button>
      </div>
      <div class="stop-list" id="stop-list"></div>
    </div>

    <div class="view" id="view-itinerary">
      <div class="scroll-view">
        <h2>Suggested Itinerary</h2>
        <p>A 2-day tour covering Vieques' top highlights — from sunrise beaches to the glowing bay at night.</p>
        <div id="itinerary-list"></div>
      </div>
    </div>

    <div class="view" id="view-history">
      <div class="scroll-view">
        <h2>Island History</h2>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div class="detail-panel" id="detail-panel">
    <button id="close-btn">&#10005;</button>
    <div id="detail-content"></div>
  </div>
</div>

const itinerary = [
  {day:1,time:"7:00 AM", stopId:14,note:"Watch sunrise from the lighthouse before town wakes up"},
  {day:1,time:"8:30 AM", stopId:7, note:"Breakfast in Isabel II, pick up your rental car"},
  {day:1,time:"10:00 AM",stopId:6, note:"Explore the fort and museum — best history on the island"},
  {day:1,time:"12:00 PM",stopId:13,note:"Quick stop at the black sand beach before heading east"},
  {day:1,time:"1:00 PM", stopId:11,note:"Swim and snorkel in the seven coves — bring lunch"},
  {day:1,time:"4:00 PM", stopId:10,note:"Afternoon snorkel at Red Beach — best visibility"},
  {day:1,time:"6:30 PM", stopId:8, note:"Sunset drinks and dinner on the Esperanza malecón"},
  {day:1,time:"8:00 PM", stopId:5, note:"Bio bay kayak tour — book in advance!"},

const historyItems = [
  {year:"Pre-1493",title:"Taíno Settlement",text:"The Taíno people inhabited Vieques for centuries, calling the island 'Bieque.' They lived by fishing, farming, and ceramics. Petroglyphs and artifacts across the island still witness their presence."},
  {year:"1493",title:"European Contact",text:"Columbus passed near Vieques on his second voyage. Spanish colonization brought devastating consequences for the Taíno population through disease and forced labor."},
  {year:"1600s–1700s",title:"Colonial Struggles",text:"Spain, England, France, and Denmark all contested Vieques. The island changed hands repeatedly and was used as a base for corsairs and smugglers."},
  {year:"1845–1865",title:"Fort Construction",text:"Spain built El Fortín Conde de Mirasol — the last Spanish military fort constructed in the Americas — on the island's highest northern point."},
  {year:"1898",title:"Transfer to United States",text:"Following the Spanish-American War, Puerto Rico (and Vieques) passed to US control, entering a new era of sugar cane agriculture and growing military interest."},
  {year:"1941",title:"Navy Takeover",text:"During World War II, the US Navy expropriated two-thirds of Vieques land, displacing thousands of residents for decades of live-fire training exercises."},
  {year:"1999–2003",title:"Navy Out Campaign",text:"The accidental killing of civilian guard David Sanes Rodriguez in 1999 galvanized massive protests. After sustained civil disobedience, the US Navy left in 2003."},
  {year:"2003–Present",title:"Wildlife Refuge & Recovery",text:"The former Navy land became the Vieques National Wildlife Refuge. Cleanup of unexploded ordnance continues while eco-tourism has grown into the island's main economy."},
  {year:"Present",title:"Resilience & Culture",text:"Despite Hurricane Maria's devastation in 2017, Vieques has rebuilt and remains one of the Caribbean's most special destinations — known for wild beaches, bio bay, and proud community culture."}
];

// ── STATE ────────────────────────────────────────────────────────────
let activeFilter='all', selectedStop=null, map;

function catColor(c){ return {beach:'#1E6B8A',nature:'#1A7A4A',bio:'#0B7A60',history:'#A04A20'}[c]||'#555'; }
function catLabel(c){ return {beach:'Beach',nature:'Nature',bio:'Bio Bay',history:'History & Culture'}[c]||c; }

// ── MAP ──────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map',{center:[18.125,-65.44],zoom:12});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  stops.forEach(s=>{
    const icon=L.divIcon({
      className:'',
      html:`<div style="width:30px;height:30px;border-radius:50%;background:${catColor(s.cat)};color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid white;">${s.id}</div>`,
      iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-18]
    });
    const m=L.marker([s.lat,s.lng],{icon}).addTo(map);
    m.bindPopup(`<div class="popup-name">${s.name}</div><div class="popup-cat">${catLabel(s.cat)}</div>`);
    m.on('click',()=>openDetail(s));
  });
}

// ── CAROUSEL ─────────────────────────────────────────────────────────

// ── DETAIL ────────────────────────────────────────────────────────────
function openDetail(stop) {
  selectedStop=stop;
  renderStops();
  if(map) map.panTo([stop.lat,stop.lng],{animate:true,duration:0.5});
  document.getElementById('detail-content').innerHTML=`
    <div style="background:${catColor(stop.cat)};padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:white;line-height:1.2;">${stop.name}</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.8);margin-top:0.25rem;">${catLabel(stop.cat)}</div>
      </div>
      ${stop.wiki ? `<a href="${stop.wiki}" target="_blank" rel="noopener" style="flex-shrink:0;background:rgba(255,255,255,0.2);color:white;text-decoration:none;padding:0.5rem 0.85rem;border-radius:8px;font-size:0.78rem;font-weight:600;border:1px solid rgba(255,255,255,0.3);white-space:nowrap;">Wikipedia ↗</a>` : ''}
    </div>
    <div class="detail-body">
      <div class="detail-meta-grid">
        <div class="meta-item"><div class="meta-label">Duration</div><div class="meta-value">${stop.duration}</div></div>
        <div class="meta-item"><div class="meta-label">Best Time</div><div class="meta-value">${stop.best}</div></div>
        <div class="meta-item" style="grid-column:span 2"><div class="meta-label">Hours</div><div class="meta-value">${stop.hours}</div></div>
      </div>
      <div class="detail-section"><h3>About</h3><p>${stop.desc}</p></div>
      <div class="detail-section"><h3>Tips</h3><ul>${stop.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderStops() {
  const list=activeFilter==='all'?stops:stops.filter(s=>s.cat===activeFilter);
  document.getElementById('stop-list').innerHTML=list.map(s=>`
    <div class="stop-card ${selectedStop?.id===s.id?'selected':''}" onclick="openDetail(stops.find(x=>x.id===${s.id}))">
      <div class="stop-num num-${s.cat}">${s.id}</div>
      <div class="stop-info">
        <div class="stop-name">${s.name}</div>
        <div class="stop-tagline">${s.tagline}</div>
        <div class="stop-badges">
          <span class="badge cat-${s.cat}">${catLabel(s.cat)}</span>
          <span class="badge" style="background:rgba(0,0,0,0.05);color:#666;">${s.best}</span>
        </div>
      </div>
    </div>`).join('');
}

function renderItinerary() {
  document.getElementById('itinerary-list').innerHTML=[1,2].map(day=>`
    <div class="day-block">
      <div class="day-label">Day ${day}</div>
      ${itinerary.filter(i=>i.day===day).map((item,idx,arr)=>{
        const s=stops.find(x=>x.id===item.stopId);
        return `<div class="it-stop">
          <div class="it-left">
            <div class="it-dot dot-${s.cat}"></div>
            ${idx<arr.length-1?'<div class="it-line"></div>':''}
          </div>
          <div class="it-content" onclick="openDetail(stops.find(x=>x.id===${s.id}));showView('stops')">
            <div class="it-time">${item.time}</div>
            <div class="it-name">${s.name}</div>
            <div class="it-desc">${item.note}</div>
            <span class="it-dur">${s.duration}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function renderHistory() {
  document.getElementById('history-list').innerHTML=historyItems.map(h=>`
    <div class="history-card">
      <div class="history-year">${h.year}</div>
      <div class="history-title">${h.title}</div>
      <div class="history-text">${h.text}</div>
    </div>`).join('');
}

function toggleFilter(btn,cat) {
  activeFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderStops();
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['stops','itinerary','history'][i]===name));
}

// ── BOOT ──────────────────────────────────────────────────────────────
renderStops();
renderItinerary();
renderHistory();
setTimeout(initMap,50);
</script>
</body>
</html>
